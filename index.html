<script id="mobile-23-independent-filter-strip-script">
(function(){
  function isMobile(){return window.matchMedia && window.matchMedia('(max-width: 860px)').matches;}
  function ensureMount(){
    var mount=document.getElementById('mobileFilterInlineMount');
    if(!mount){
      mount=document.createElement('div');
      mount.id='mobileFilterInlineMount';
    }
    var layout=document.querySelector('#contentRoot .planner-layout');
    if(layout && mount.parentNode!==layout.parentNode){ layout.parentNode.insertBefore(mount,layout); }
    else if(layout && mount.nextSibling!==layout){ layout.parentNode.insertBefore(mount,layout); }
    return mount;
  }
  function escLocal(s){
    if(typeof esc==='function') return esc(s);
    return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
  }
  function renderStrip(){
    if(!isMobile()) return;
    var mount=ensureMount();
    var status=(state&&state.statusFilter)||'all';
    var tag=(state&&state.tagFilter)||'all';
    var text=(state&&state.textFilter)||'';
    var tagOpts='<option value="all">All tags</option>';
    try{
      tagOpts += tags().map(function(t){return '<option value="'+escLocal(t.key)+'" '+(tag===t.key?'selected':'')+'>'+escLocal((t.icon? t.icon+' ':'')+t.name)+'</option>';}).join('');
    }catch(e){}
    mount.innerHTML='<div class="lifeos-mobile-filter-strip">'
      +'<select class="mf-status" id="mobileStatusFilter" aria-label="Status filter" onchange="window.setStatusFilter(this.value)">'
      +'<option value="all" '+(status==='all'?'selected':'')+'>All status</option>'
      +'<option value="next" '+(status==='next'?'selected':'')+'>Next</option>'
      +'<option value="open" '+(status==='open'?'selected':'')+'>Open</option>'
      +'<option value="overdue" '+(status==='overdue'?'selected':'')+'>Overdue</option>'
      +'<option value="done" '+(status==='done'?'selected':'')+'>Done</option>'
      +'<option value="skipped" '+(status==='skipped'?'selected':'')+'>Skipped</option>'
      +'</select>'
      +'<select class="mf-tag" id="mobileTagFilter" aria-label="Tag filter" onchange="window.setTagFilter(this.value)">'+tagOpts+'</select>'
      +'<input class="mf-text" id="taskTextFilter" aria-label="Task text filter" value="'+escLocal(text)+'" placeholder="Filter…" inputmode="search" autocomplete="off" oninput="window.setTextFilter(this.value)">'
      +'</div>';
  }
  function setOpen(open){
    if(!isMobile()) return false;
    window.__lifeosMobileFiltersOpen=!!open;
    document.body.classList.toggle('mobile-filters-open',!!open);
    document.querySelectorAll('.mobile-day-action.filter').forEach(function(btn){btn.classList.toggle('active',!!open);});
    if(open){ renderStrip(); }
    return false;
  }
  window.toggleMobileFilterPanel=function(force){
    var next=typeof force==='boolean'?force:!document.body.classList.contains('mobile-filters-open');
    return setOpen(next);
  };
  var prevRender=window.renderIdealDay;
  if(typeof prevRender==='function'){
    window.renderIdealDay=function(){
      var keep=isMobile() && !!window.__lifeosMobileFiltersOpen;
      var r=prevRender.apply(this,arguments);
      if(keep) setTimeout(function(){setOpen(true);},0);
      return r;
    };
  }
  ['setStatusFilter','setTagFilter'].forEach(function(name){
    var prev=window[name];
    if(typeof prev==='function'){
      window[name]=function(){
        window.__lifeosMobileFiltersOpen=isMobile() && document.body.classList.contains('mobile-filters-open');
        var r=prev.apply(this,arguments);
        if(window.__lifeosMobileFiltersOpen) setTimeout(function(){setOpen(true);},0);
        return r;
      };
    }
  });
  var prevText=window.setTextFilter;
  window.setTextFilter=function(v){
    window.__lifeosMobileFiltersOpen=isMobile() && document.body.classList.contains('mobile-filters-open');
    if(typeof prevText==='function') return prevText.call(this,v);
    state.textFilter=v||''; renderIdealDay();
  };
  document.addEventListener('DOMContentLoaded',function(){ if(window.__lifeosMobileFiltersOpen) setOpen(true); });
  window.addEventListener('resize',function(){ if(!isMobile()) document.body.classList.remove('mobile-filters-open'); else if(window.__lifeosMobileFiltersOpen) setOpen(true); });
})();
</script>

<script id="mobile-42-left-pane-drag-fix-script">
(function(){
  function root(){return document.getElementById('contentRoot');}
  function getScrollSnapshot(){
    const r=root();
    const left=r && r.querySelector('.left-stack');
    const side=r && r.querySelector('.side-panel');
    const rail=r && r.querySelector('.left-stack .day-rail');
    return {
      winX:window.scrollX||window.pageXOffset||0,
      winY:window.scrollY||window.pageYOffset||0,
      leftTop:left?left.scrollTop:0,
      leftLeft:left?left.scrollLeft:0,
      sideTop:side?side.scrollTop:0,
      sideLeft:side?side.scrollLeft:0,
      railLeft:rail?rail.scrollLeft:0,
      mobileLeftOpen:document.body.classList.contains('mobile-left-open')
    };
  }
  function restoreScrollSnapshot(s){
    if(!s)return;
    const r=root();
    const left=r && r.querySelector('.left-stack');
    const side=r && r.querySelector('.side-panel');
    const rail=r && r.querySelector('.left-stack .day-rail');
    if(s.mobileLeftOpen) document.body.classList.add('mobile-left-open');
    if(left){left.scrollTop=s.leftTop||0;left.scrollLeft=s.leftLeft||0;}
    if(side){side.scrollTop=s.sideTop||0;side.scrollLeft=s.sideLeft||0;}
    if(rail) rail.scrollLeft=s.railLeft||0;
    window.scrollTo(s.winX||0,s.winY||0);
  }
  function restoreSoon(s){

    requestAnimationFrame(function(){restoreScrollSnapshot(s);});
    setTimeout(function(){restoreScrollSnapshot(s);},0);
  }

    document.querySelectorAll('.reorderable-side-row').forEach(function(row){
      row.classList.remove('drop-before','drop-after','dragging');
    });
  };

  window.startSideListDrag=function(event,type,id){
    const snap=getScrollSnapshot();
    if(typeof state!=='undefined'){
      state.sideListDrag={type:type,id:id,targetId:null,after:false,scrollSnapshot:snap};
      state.skipDayCenterOnce=true;
    }
    if(event && event.dataTransfer){
      event.dataTransfer.effectAllowed='move';
      try{event.dataTransfer.setData('text/plain',type+':'+id);}catch(e){}

      if(event && event.currentTarget) event.currentTarget.classList.add('dragging');

<script id="mobile-43-left-pane-scroll-lock-script">
(function(){
  function paneFromEvent(event){
    return event && event.currentTarget && event.currentTarget.closest ? event.currentTarget.closest('.left-stack') : document.querySelector('#contentRoot .left-stack');
  }
  function pane(){return document.querySelector('#contentRoot .left-stack');}
  function dayRail(){return document.querySelector('#contentRoot .left-stack .day-rail');}
  function rowSelector(type,id){return '.reorderable-side-row[data-side-list-type="'+String(type).replace(/"/g,'\\"')+'"][data-side-list-id="'+String(id).replace(/"/g,'\\"')+'"]';}
  function captureLeftPane(event,type,id){
    const p=paneFromEvent(event);
    const r=event && event.currentTarget ? event.currentTarget : null;
    const pr=p?p.getBoundingClientRect():null;
    const rr=r?r.getBoundingClientRect():null;
    const rail=dayRail();
    return {
      top:p?p.scrollTop:0,
      left:p?p.scrollLeft:0,
      winX:window.scrollX||window.pageXOffset||0,
      winY:window.scrollY||window.pageYOffset||0,
      railLeft:rail?rail.scrollLeft:0,
      type:type,
      id:id,
      rowOffset:(pr&&rr)?rr.top-pr.top:null,
      mobileLeftOpen:document.body.classList.contains('mobile-left-open'),
      capturedAt:Date.now()
    };
  }
  function restoreLeftPane(s){
    if(!s)return;
    const p=pane();
    if(s.mobileLeftOpen) document.body.classList.add('mobile-left-open');
    if(p){
      p.classList.add('drag-scroll-lock');
      p.scrollTop=s.top||0;
      p.scrollLeft=s.left||0;
      if(s.type&&s.id&&Number.isFinite(s.rowOffset)){
        const row=document.querySelector(rowSelector(s.type,s.id));
        if(row){
          const pr=p.getBoundingClientRect();
          const rr=row.getBoundingClientRect();
          const delta=(rr.top-pr.top)-s.rowOffset;
          if(Math.abs(delta)>.5) p.scrollTop+=delta;
        }
      }
    }
    const rail=dayRail();
    if(rail) rail.scrollLeft=s.railLeft||0;
    window.scrollTo(s.winX||0,s.winY||0);
  }
  function restoreMany(s){
    restoreLeftPane(s);
    requestAnimationFrame(function(){restoreLeftPane(s);});
    requestAnimationFrame(function(){requestAnimationFrame(function(){restoreLeftPane(s);});});
    setTimeout(function(){restoreLeftPane(s);},0);
    setTimeout(function(){restoreLeftPane(s);},40);
    setTimeout(function(){restoreLeftPane(s);},120);
    setTimeout(function(){restoreLeftPane(s); const p=pane(); if(p)p.classList.remove('drag-scroll-lock');},260);
  }

    });

    const snap=captureLeftPane(event,type,id);
    const p=paneFromEvent(event); if(p)p.classList.add('drag-scroll-lock');
    if(typeof state!=='undefined'){
      state.sideListDrag={type:type,id:id,targetId:null,after:false,scrollSnapshot:snap};
      state.skipDayCenterOnce=true;
      state.pendingIdealViewport={leftTop:snap.top||0,leftLeft:snap.left||0,dayRailLeft:snap.railLeft||0,taskTop:0,taskLeft:0,scrollX:snap.winX||0,scrollY:snap.winY||0,capturedAt:Date.now()};
    }
    if(event && event.dataTransfer){
      event.dataTransfer.effectAllowed='move';
      try{event.dataTransfer.setData('text/plain',type+':'+id);}catch(e){}
    }
    requestAnimationFrame(function(){
      if(event && event.currentTarget) event.currentTarget.classList.add('dragging');
      restoreLeftPane(snap);
    });
  };
  window.overSideListDrag=function(event,type,id){
    const drag=typeof state!=='undefined'?state.sideListDrag:null;
    if(!drag || drag.type!==type || drag.id===id) return;
    if(event){
      event.preventDefault();
      if(event.dataTransfer) event.dataTransfer.dropEffect='move';
    }
    const row=event.currentTarget;
    const rect=row.getBoundingClientRect();
    const after=event.clientY>rect.top+rect.height/2;
    document.querySelectorAll('.reorderable-side-row[data-side-list-type="'+type+'"]').forEach(function(el){el.classList.remove('drop-before','drop-after');});
    row.classList.add(after?'drop-after':'drop-before');
    drag.targetId=id;
    drag.after=after;
    /* Do not force scrollTop on every dragover; that was causing jumpy native auto-scroll. */
  };
  window.leaveSideListDrag=function(event){
    const row=event.currentTarget;
    if(row && !row.contains(event.relatedTarget)) row.classList.remove('drop-before','drop-after');
  };
  window.dropSideListDrag=function(event,type,targetId){
    if(event) event.preventDefault();
    const drag=typeof state!=='undefined'?state.sideListDrag:null;
    const snap=drag && drag.scrollSnapshot ? drag.scrollSnapshot : captureLeftPane(event,type,targetId);
    if(!drag || drag.type!==type || drag.id===targetId){
      if(typeof state!=='undefined') state.sideListDrag=null;
      clearMarkers();
      restoreMany(snap);
      return;
    }
    const rect=event.currentTarget.getBoundingClientRect();
    const after=event.clientY>rect.top+rect.height/2;
    if(typeof state!=='undefined'){
      state.pendingIdealViewport={leftTop:snap.top||0,leftLeft:snap.left||0,dayRailLeft:snap.railLeft||0,taskTop:0,taskLeft:0,scrollX:snap.winX||0,scrollY:snap.winY||0,capturedAt:Date.now()};

    }

    clearMarkers();

    restoreMany(snap);
    toast(type==='tags'?'Tag progress order saved':'Life rules order saved');
  };
  window.endSideListDrag=function(){
