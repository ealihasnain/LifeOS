/* v2.10.24 — Task Calendar Visual Polish */
/* v2.10.22 — stable independent panes, natural row sizing, hidden desktop scrollbars */
body.ideal-day-scroll-lock{overflow:hidden}
body.ideal-day-scroll-lock .page{
  height:calc(100vh - var(--nav-h));
  height:calc(100dvh - var(--nav-h));
  min-height:0;
  overflow:hidden;
}
body.ideal-day-scroll-lock .breadcrumb-bar{
  height:47px;
  min-height:47px;
  overflow:hidden;
}
body.ideal-day-scroll-lock .content{
  height:calc(100vh - var(--nav-h) - 47px);
  height:calc(100dvh - var(--nav-h) - 47px);
  min-height:0;
  padding-bottom:12px;
  overflow:hidden;
}
body.ideal-day-scroll-lock #contentRoot,
body.ideal-day-scroll-lock .planner-layout{
  height:100%;
  min-height:0;
}
body.ideal-day-scroll-lock .planner-layout{
  align-items:stretch;
  grid-template-rows:minmax(0,1fr);
  overflow:hidden;
}
body.ideal-day-scroll-lock .left-stack,
body.ideal-day-scroll-lock .planner-main{
  height:100%;
  min-height:0;
  overflow:auto;
  overscroll-behavior:contain;
  scroll-behavior:auto;
}
body.ideal-day-scroll-lock .left-stack{overflow-x:hidden}
body.ideal-day-scroll-lock .left-stack>* ,
body.ideal-day-scroll-lock .planner-main>* ,
body.ideal-day-scroll-lock .task-list.task-table .task-card{
  flex-shrink:0;
}

/* Left-panel calendar only — horizontal day cards. Task-card calendars are untouched. */
body.ideal-day-scroll-lock .left-stack .month-head{
  display:grid;
  grid-template-columns:42px minmax(0,1fr) 42px;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
body.ideal-day-scroll-lock .left-stack .month-head .tiny-btn{
  width:42px;
  height:42px;
  min-width:42px;
  border-radius:12px;
  font-size:16px;
}
body.ideal-day-scroll-lock .left-stack .month-title{
  text-align:center;
  font-size:16px;
  font-weight:900;
  letter-spacing:.01em;
}
body.ideal-day-scroll-lock .left-stack .day-rail{
  display:flex;
  grid-template-columns:none;
  gap:4px;
  overflow-x:auto;
  overflow-y:hidden;
  padding:4px 0 8px;
  scroll-snap-type:x proximity;
  overscroll-behavior-x:contain;
}
body.ideal-day-scroll-lock .left-stack .day-box{
  flex:0 0 calc((100% - 24px) / 7);
  width:calc((100% - 24px) / 7);
  min-width:0;
  min-height:58px;
  padding:6px 2px;
  border-radius:10px;
  flex-direction:column;
  gap:2px;
  scroll-snap-align:start;
}
body.ideal-day-scroll-lock .left-stack .day-name{
  display:block;
  color:var(--text-2);
  font-size:9.5px;
  font-weight:600;
  line-height:1.1;
  text-transform:uppercase;
  letter-spacing:.02em;
}
body.ideal-day-scroll-lock .left-stack .day-num{
  font-size:13px;
  font-weight:900;
  line-height:1.1;
}
body.ideal-day-scroll-lock .left-stack .day-box.selected .day-name{color:rgba(255,255,255,.86)}

/* Desktop: wheel/trackpad scrolling remains active, but bars stay visually hidden. */
@media(min-width:861px){
  body.ideal-day-scroll-lock .left-stack,
  body.ideal-day-scroll-lock .planner-main,
  body.ideal-day-scroll-lock .left-stack .day-rail{
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  body.ideal-day-scroll-lock .left-stack::-webkit-scrollbar,
  body.ideal-day-scroll-lock .planner-main::-webkit-scrollbar,
  body.ideal-day-scroll-lock .left-stack .day-rail::-webkit-scrollbar{
    width:0;
    height:0;
    display:none;
  }
}
@media(max-width:860px){
  body.ideal-day-scroll-lock{overflow:auto}
  body.ideal-day-scroll-lock .page{
    height:auto;
    min-height:calc(100vh - var(--nav-h));
    overflow:visible;
  }
  body.ideal-day-scroll-lock .breadcrumb-bar{height:auto;overflow:visible}
  body.ideal-day-scroll-lock .content{
    height:auto;
    min-height:0;
    padding-bottom:70px;
    overflow:visible;
  }
  body.ideal-day-scroll-lock #contentRoot,
  body.ideal-day-scroll-lock .planner-layout,
  body.ideal-day-scroll-lock .left-stack,
  body.ideal-day-scroll-lock .planner-main{
    height:auto;
    min-height:0;
    overflow:visible;
  }
  body.ideal-day-scroll-lock .left-stack .day-rail{
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:auto;
  }
  body.ideal-day-scroll-lock .left-stack .day-rail::-webkit-scrollbar{
    display:block;
    height:8px;
  }
}


/* v2.10.24 — professional task-calendar modal (scoped; mini task calendars remain untouched) */
.task-calendar-modal{
  align-items:center;
  padding:72px 18px 24px;
  backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);
}
.task-calendar-modal .modal-box{
  width:min(980px,96vw);
  max-height:min(840px,91vh);
  border:1px solid rgba(112,91,67,.28);
  border-radius:20px;
  background:var(--surface);
  box-shadow:0 28px 75px rgba(28,18,8,.28),0 5px 18px rgba(28,18,8,.14);
  overflow:hidden;
}
.task-calendar-modal .modal-body{
  max-height:calc(91vh - 78px);
  padding:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,0)),var(--surface);
}
.task-cal-modal-header{
  min-height:76px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(52,106,160,.12),rgba(181,103,42,.05) 62%,rgba(255,255,255,.22));
}
.task-cal-modal-heading{display:flex;align-items:center;gap:12px;min-width:0}
.task-cal-header-icon{
  width:42px;height:42px;flex:0 0 42px;border-radius:13px;
  display:grid;place-items:center;color:var(--blue);
  border:1px solid rgba(52,106,160,.24);background:rgba(52,106,160,.10);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
}
.task-cal-header-icon svg{width:20px;height:20px;stroke:currentColor}
.task-cal-heading-copy{min-width:0}
.task-cal-eyebrow{font-size:10.5px;font-weight:900;letter-spacing:.10em;text-transform:uppercase;color:var(--blue);line-height:1.2}
.task-cal-modal-title{margin-top:3px;font-size:18px;font-weight:950;letter-spacing:-.025em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-cal-modal-subtitle{margin-top:2px;font-size:12px;color:var(--text-2);font-weight:600}
.task-cal-modal-close{width:36px!important;height:36px!important;flex:0 0 36px;border-radius:11px!important;background:rgba(255,255,255,.5)!important}
.task-cal-modal-close:hover{background:var(--red-s)!important;border-color:rgba(168,56,56,.35)!important;color:var(--red)!important}

.task-cal-modal-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(260px,.72fr);gap:18px;align-items:stretch}
.task-cal-main{
  min-width:0;padding:16px;border:1px solid var(--border);border-radius:16px;
  background:var(--card);box-shadow:var(--shadow-xs);
}
.task-cal-month-head{
  display:grid;grid-template-columns:40px minmax(0,1fr) auto;align-items:center;gap:10px;margin-bottom:15px;
}
.task-cal-month-copy{text-align:center;min-width:0}
.task-cal-month-title{display:block;font-size:18px;font-weight:950;letter-spacing:-.025em;color:var(--text);line-height:1.1}
.task-cal-month-subtitle{display:block;margin-top:4px;font-size:11.5px;color:var(--text-3);font-weight:650}
.task-cal-month-tools{display:flex;align-items:center;justify-content:flex-end;gap:7px}
.task-cal-nav-btn{
  width:38px;height:38px;border:1px solid var(--border);border-radius:11px;background:var(--card-2);
  color:var(--text-2);display:grid;place-items:center;font-size:22px;font-weight:700;line-height:1;
  box-shadow:var(--shadow-xs);transition:transform .14s,border-color .14s,color .14s,background .14s;
}
.task-cal-nav-btn:hover{transform:translateY(-1px);border-color:var(--blue);color:var(--blue);background:var(--blue-s)}
.task-cal-today-btn{
  height:38px;padding:0 12px;border:1px solid var(--border);border-radius:11px;background:var(--card-2);
  color:var(--text-2);font-size:11.5px;font-weight:900;box-shadow:var(--shadow-xs);
}
.task-cal-today-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-s)}
.task-cal-weekdays,.task-cal-month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px}
.task-cal-weekdays{margin:0 0 7px;padding:0 2px}
.task-cal-weekdays span{text-align:center;font-size:10.5px;font-weight:950;color:var(--text-3);text-transform:uppercase;letter-spacing:.075em}
.task-cal-day{
  min-height:64px;border:1px solid var(--border-2);border-radius:12px;padding:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  color:var(--text);font-weight:900;position:relative;background:var(--card-2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
  transition:transform .14s,border-color .14s,background .14s,box-shadow .14s,color .14s;
}
.task-cal-day:hover{transform:translateY(-2px);border-color:rgba(52,106,160,.5);background:var(--blue-s);box-shadow:0 6px 14px rgba(28,18,8,.08)}
.task-cal-day .day-num{font-size:14px;font-weight:950;line-height:1;font-variant-numeric:tabular-nums}
.task-cal-day .day-status{width:7px;height:7px;border-radius:50%;background:#bfb5a6;border:1px solid rgba(0,0,0,.04);box-shadow:0 0 0 3px rgba(191,181,166,.13)}
.task-cal-day.due{background:var(--card)}
.task-cal-day.done{background:linear-gradient(180deg,rgba(50,123,80,.10),rgba(50,123,80,.04)),var(--card)}
.task-cal-day.skipped{background:linear-gradient(180deg,rgba(168,56,56,.09),rgba(168,56,56,.03)),var(--card)}
.task-cal-day.mixed,.task-cal-day.partial{background:linear-gradient(180deg,rgba(181,103,42,.11),rgba(181,103,42,.035)),var(--card)}
.task-cal-day.done .day-status{background:var(--green);box-shadow:0 0 0 3px var(--green-s)}
.task-cal-day.skipped .day-status{background:var(--red);box-shadow:0 0 0 3px var(--red-s)}
.task-cal-day.mixed .day-status,.task-cal-day.partial .day-status{background:var(--amber)!important;border-color:var(--amber)!important;box-shadow:0 0 0 3px var(--amber-s)}
.task-cal-day.off{opacity:.52;background:rgba(228,220,207,.48)}
.task-cal-day.off .day-status{background:#d7cfc3;box-shadow:none}
.task-cal-day.future .day-num{opacity:.68}
.task-cal-day.today::after{content:'';position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px var(--blue-s)}
.task-cal-day.selected{
  opacity:1;color:#fff;border-color:var(--blue);background:linear-gradient(145deg,#3f76aa,#2f628f);
  box-shadow:0 8px 18px rgba(52,106,160,.27),inset 0 1px 0 rgba(255,255,255,.25);
  transform:translateY(-1px);
}
.task-cal-day.selected:hover{background:linear-gradient(145deg,#447db4,#2b5c87);border-color:var(--blue-h)}
.task-cal-day.selected .day-status{background:#fff;border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.20)}
.task-cal-day.selected.today::after{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.18)}
.task-cal-day.blank{visibility:hidden;pointer-events:none}
.task-cal-legend{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px;padding-top:12px;
  border-top:1px solid var(--border-2);font-size:11px;color:var(--text-2);font-weight:700;
}
.task-cal-legend span{display:inline-flex;align-items:center;gap:6px}
.legend-dot{width:8px;height:8px;border-radius:50%;background:#bfb5a6;box-shadow:0 0 0 3px rgba(191,181,166,.13)}
.legend-dot.done{background:var(--green);box-shadow:0 0 0 3px var(--green-s)}
.legend-dot.skipped{background:var(--red);box-shadow:0 0 0 3px var(--red-s)}
.legend-dot.partial{background:var(--amber);box-shadow:0 0 0 3px var(--amber-s)}
.legend-dot.off{background:#d7cfc3;box-shadow:none}

.task-cal-side{
  min-width:0;padding:16px;border:1px solid var(--border);border-radius:16px;background:var(--card);
  box-shadow:var(--shadow-xs);display:flex;flex-direction:column;
}
.task-cal-side-head{padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--border-2)}
.task-cal-side-label{display:block;font-size:10.5px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3)}
.task-cal-side-date{display:block;margin-top:5px;font-size:18px;font-weight:950;line-height:1.18;letter-spacing:-.025em;color:var(--text)}
.task-cal-status-badge{display:inline-flex;align-items:center;gap:6px;margin-top:9px;height:25px;padding:0 9px;border-radius:999px;border:1px solid var(--border);background:var(--card-2);font-size:10.5px;font-weight:950;text-transform:uppercase;letter-spacing:.04em;color:var(--text-2)}
.task-cal-status-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:#bfb5a6}
.task-cal-status-badge.done{color:var(--green);background:var(--green-s);border-color:rgba(50,123,80,.22)}
.task-cal-status-badge.done::before{background:var(--green)}
.task-cal-status-badge.skipped{color:var(--red);background:var(--red-s);border-color:rgba(168,56,56,.22)}
.task-cal-status-badge.skipped::before{background:var(--red)}
.task-cal-status-badge.mixed,.task-cal-status-badge.partial{color:var(--amber);background:var(--amber-s);border-color:rgba(181,103,42,.24)}
.task-cal-status-badge.mixed::before,.task-cal-status-badge.partial::before{background:var(--amber)}
.task-cal-status-badge.off{color:var(--text-3)}
.task-cal-actions{display:flex;flex-direction:column;gap:14px;flex:1}
.task-cal-context{display:flex;gap:10px;align-items:flex-start;padding:11px;border:1px solid var(--border-2);border-radius:12px;background:var(--card-2)}
.task-cal-context-icon{width:28px;height:28px;flex:0 0 28px;border-radius:9px;display:grid;place-items:center;background:var(--blue-s);color:var(--blue);font-weight:950}
.task-cal-context strong{display:block;font-size:12.5px;font-weight:950;color:var(--text);line-height:1.25}
.task-cal-context p{margin-top:3px;font-size:11.5px;line-height:1.4;color:var(--text-2)}
.task-cal-action-section{display:grid;gap:7px}
.task-cal-action-label{font-size:10.5px;font-weight:950;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em}
.task-cal-status-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.task-cal-status-btn{height:40px;border:1px solid var(--border);border-radius:11px;background:var(--card-2);display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text-2);font-size:12px;font-weight:900;transition:.14s}
.task-cal-status-btn svg{width:15px;height:15px;stroke:currentColor}
.task-cal-status-btn:hover:not([disabled]){transform:translateY(-1px);box-shadow:var(--shadow-xs)}
.task-cal-status-btn.complete:hover:not([disabled]),.task-cal-status-btn.complete.active{border-color:var(--green);background:var(--green-s);color:var(--green)}
.task-cal-status-btn.skip:hover:not([disabled]),.task-cal-status-btn.skip.active{border-color:var(--red);background:var(--red-s);color:var(--red)}
.task-cal-progress-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-height:38px;padding:7px;border:1px solid var(--border-2);border-radius:11px;background:var(--card-2)}
.task-cal-progress-actions .action-step,.task-cal-progress-actions .action-icon-btn{height:30px!important;min-width:30px!important;background:var(--card)!important}
.task-cal-details-btn{height:40px;margin-top:auto;border:1px solid var(--blue);border-radius:11px;background:var(--blue);color:#fff;font-size:12px;font-weight:950;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 5px 12px rgba(52,106,160,.18)}
.task-cal-details-btn:hover:not([disabled]){background:var(--blue-h);border-color:var(--blue-h);transform:translateY(-1px)}
.task-cal-lock-note{padding:9px 10px;border:1px solid rgba(168,56,56,.22);border-radius:10px;background:var(--red-s);color:var(--red);font-size:11.5px;font-weight:750;line-height:1.4}

@media(max-width:820px){
  .task-calendar-modal{align-items:flex-start;padding:66px 10px 14px}
  .task-calendar-modal .modal-box{max-height:none;width:min(720px,100%)}
  .task-calendar-modal .modal-body{max-height:calc(100vh - 138px);padding:12px}
  .task-cal-modal-grid{grid-template-columns:1fr}
  .task-cal-side{min-height:0}
}
@media(max-width:560px){
  .task-cal-modal-header{padding:12px 13px;min-height:68px}
  .task-cal-header-icon{width:36px;height:36px;flex-basis:36px;border-radius:11px}
  .task-cal-modal-title{font-size:15px}.task-cal-modal-subtitle{display:none}
  .task-cal-main,.task-cal-side{padding:11px;border-radius:13px}
  .task-cal-month-head{grid-template-columns:36px minmax(0,1fr) 36px;gap:7px}
  .task-cal-month-tools .task-cal-today-btn{display:none}
  .task-cal-nav-btn{width:34px;height:34px;border-radius:10px}
  .task-cal-month-title{font-size:15px}.task-cal-month-subtitle{display:none}
  .task-cal-weekdays,.task-cal-month-grid{gap:4px}
  .task-cal-day{min-height:48px;padding:5px;border-radius:9px;gap:5px}
  .task-cal-day .day-num{font-size:12.5px}
  .task-cal-day.today::after{top:5px;right:5px;width:5px;height:5px}
  .task-cal-legend{gap:9px}
}


/* v2.10.25 — nutrition library + health profile planner */
.profile-launch{cursor:pointer;position:relative;transition:transform .14s,box-shadow .14s,filter .14s}
.profile-launch:hover,.profile-launch:focus-visible{transform:translateY(-1px);box-shadow:0 0 0 3px rgba(52,106,160,.24),0 5px 14px rgba(0,0,0,.22);filter:brightness(1.08)}
.profile-launch::after{content:'';position:absolute;right:-2px;bottom:-2px;width:8px;height:8px;border-radius:50%;background:#72c48d;border:2px solid var(--nav-bg)}
.nutrient-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-top:10px}.nutrient-card{padding:8px;border:1px solid var(--border);border-radius:9px;background:var(--card);min-width:0}.nutrient-card strong{font-size:14px;display:block;white-space:nowrap}.nutrient-card span{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);font-weight:900;margin-top:2px}.nutrient-card.warn{background:var(--amber-s);border-color:rgba(181,103,42,.22)}

async function handleSafetyImportFile(event){const file=event.target.files?.[0];if(!file)return;try{if(file.size>25*1024*1024)throw new Error('Backup is larger than the 25 MB safety limit.');const raw=JSON.parse(await file.text());state.safetyImportPreview=validateSafetyBackup(raw,file.name);state.safetyLastReport=null;renderSafetyModal()}catch(e){state.safetyImportPreview={fileName:file.name,errors:['Could not read this backup: '+String(e?.message||e)],warnings:[],skipped:[],data:{},schemaVersion:'?',appVersion:'',migrated:false};renderSafetyModal()}}

// v2.10.22 — hard rule: every Ideal Day rerender preserves pane and calendar positions.
function captureIdealDayViewState(taskId=null){
 if(state.section!=='ideal-day')return null;
 const root=$('#contentRoot');
 if(!root)return null;
 const leftPane=root.querySelector('.left-stack');
 const taskPane=root.querySelector('.planner-main');
 const dayRail=root.querySelector('.left-stack .day-rail');
 if(!leftPane&&!taskPane)return null;
 const active=document.activeElement;
 const activeInRoot=!!(active&&root.contains(active));
 let parentId=taskId?parentTaskId(taskId):null;
 if(!parentId&&state.drawerTaskId)parentId=parentTaskId(state.drawerTaskId);
 if(!parentId&&activeInRoot){
  const activeCard=active.closest?.('.task-card[data-parent-task]');
  parentId=activeCard?.getAttribute('data-parent-task')||null;
 }
 const cards=taskPane?[...taskPane.querySelectorAll('.task-card[data-parent-task]')]:[];
 const card=parentId?cards.find(el=>el.getAttribute('data-parent-task')===parentId):null;
 const paneRect=taskPane?.getBoundingClientRect();
 return {
  parentId,
  cardOffset:card&&paneRect?card.getBoundingClientRect().top-paneRect.top:null,
  leftTop:leftPane?.scrollTop||0,
  leftLeft:leftPane?.scrollLeft||0,
  dayRailLeft:dayRail?.scrollLeft||0,
  taskTop:taskPane?.scrollTop||0,
  taskLeft:taskPane?.scrollLeft||0,
  scrollX:window.scrollX||window.pageXOffset||0,
  scrollY:window.scrollY||window.pageYOffset||0,
  activeId:activeInRoot&&active.id?active.id:null,
  selectionStart:activeInRoot&&'selectionStart' in active?active.selectionStart:null,
  selectionEnd:activeInRoot&&'selectionEnd' in active?active.selectionEnd:null,
  capturedAt:Date.now()
 };
}
function rememberIdealDayViewport(taskId){
 const snapshot=captureIdealDayViewState(taskId);
 if(snapshot)state.pendingIdealViewport=snapshot;
}
function restoreIdealDayViewport(snapshot,restoreLeft=true){
 if(!snapshot||Date.now()-(snapshot.capturedAt||0)>5000)return;
 const restore=()=>{
  const root=$('#contentRoot');
  if(!root)return;
  const leftPane=root.querySelector('.left-stack');
  const taskPane=root.querySelector('.planner-main');
  const dayRail=root.querySelector('.left-stack .day-rail');
  if(restoreLeft&&leftPane){
   leftPane.scrollTop=snapshot.leftTop||0;
   leftPane.scrollLeft=snapshot.leftLeft||0;
  }
  if(restoreLeft&&dayRail)dayRail.scrollLeft=snapshot.dayRailLeft||0;
  if(taskPane){
   taskPane.scrollTop=snapshot.taskTop||0;
   taskPane.scrollLeft=snapshot.taskLeft||0;
   if(snapshot.parentId&&Number.isFinite(snapshot.cardOffset)){
    const card=[...taskPane.querySelectorAll('.task-card[data-parent-task]')].find(el=>el.getAttribute('data-parent-task')===snapshot.parentId);
    if(card){
     const paneTop=taskPane.getBoundingClientRect().top;
     const delta=(card.getBoundingClientRect().top-paneTop)-snapshot.cardOffset;
     if(Math.abs(delta)>.5)taskPane.scrollTop+=delta;
    }
   }
  }
  if(window.matchMedia('(max-width:860px)').matches)window.scrollTo(snapshot.scrollX||0,snapshot.scrollY||0);
  if(snapshot.activeId){
   const el=document.getElementById(snapshot.activeId);
   if(el){
    el.focus({preventScroll:true});
    if('setSelectionRange' in el&&snapshot.selectionStart!==null){
     try{el.setSelectionRange(snapshot.selectionStart,snapshot.selectionEnd??snapshot.selectionStart)}catch(e){}
    }
   }
  }
 };
 requestAnimationFrame(()=>requestAnimationFrame(restore));
}

function monthIndexFromName(name){return ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'].findIndex(m=>String(name||'').toLowerCase().startsWith(m));}
function hydrateScheduleForTestPack(sch){
 if(!sch) return {type:'daily'};
 if(sch.type==='today') return {type:'once',date:isoDate(new Date())};
 if(sch.type==='datesSpec'){
   const y=parseIso(state.selectedDate||isoDate(new Date())).getFullYear();
   const mi=monthIndexFromName(sch.month);
   return {type:'dates',dates:(sch.days||[]).map(day=>isoDate(new Date(y,mi<0?0:mi,Number(day)))).filter(Boolean)};
 }
 return sch;
}

}

function ensureFoodLibrary(){

function engRoleplays(){return load(K.engRoleplays,[])}
function engStories(){return load(K.engStories,[])}
function engNetworking(){return load(K.engNetworking,[])}
function engSelfPresentation(){return load(K.engSelfPresentation,[])}
function saveEngPhrases(v){save(K.engPhrases,v)}
function saveEngRoleplays(v){save(K.engRoleplays,v)}
function saveEngStories(v){save(K.engStories,v)}

function setEnglishTab(tab){state.englishTab=tab;renderEnglishLab()}
function renderEnglishLab(){
 const tab=state.englishTab||'dashboard';
 const tabs=[['dashboard','Dashboard'],['phrases','Phrase Bank'],['roleplay','Roleplay Lab'],['stories','Story Vault'],['networking','Networking'],['self','Self-Presentation']];
 const body=tab==='phrases'?renderPhraseBank():tab==='roleplay'?renderRoleplayLab():tab==='stories'?renderStoryVault():tab==='networking'?renderNetworkingTracker():tab==='self'?renderSelfPresentationLab():renderEnglishDashboard();
 $('#contentRoot').innerHTML=`<div class="english-wrap"><div class="english-tabs">${tabs.map(([id,label])=>`<button class="english-tab ${tab===id?'active':''}" onclick="setEnglishTab('${id}')">${label}</button>`).join('')}</div>${body}</div>`;
}
function englishDashboardStats(){
 const phrases=engPhrases(), roles=engRoleplays(), stories=engStories(), network=engNetworking(), self=engSelfPresentation();
 const today=isoDate(new Date());
 const weekAgo=new Date(); weekAgo.setDate(weekAgo.getDate()-6); const weekIso=isoDate(weekAgo);
 const phraseUsed=phrases.filter(p=>p.status==='Used'||p.status==='Mastered'||p.lastUsed).length;
 const roleMin=roles.reduce((s,r)=>s+(Number(r.duration)||0),0);
 const weekRoles=roles.filter(r=>(r.date||'')>=weekIso).length;
 const avgScore=roles.length?Math.round(roles.reduce((s,r)=>s+(Number(r.score)||0),0)/roles.length*10)/10:0;
 const practicedStories=stories.filter(s=>s.lastPracticed).length;
 const networkActions=network.filter(n=>(n.lastContact||n.createdAt||'')>=weekIso).length;
 const selfPracticed=self.filter(x=>x.lastPracticed).length;
 const selfAvg=self.length?Math.round(self.reduce((sum,x)=>sum+(Number(x.confidence)||0),0)/self.length*10)/10:0;
 return {phrases,roles,stories,network,self,phraseUsed,roleMin,weekRoles,avgScore,practicedStories,networkActions,selfPracticed,selfAvg,today};
}
function renderEnglishDashboard(){
 const s=englishDashboardStats();
 const phrasePct=s.phrases.length?Math.round(s.phraseUsed/s.phrases.length*100):0;
 const roleTarget=120; const rolePct=Math.min(100,Math.round(s.roleMin/roleTarget*100));
 const storyPct=s.stories.length?Math.round(s.practicedStories/s.stories.length*100):0;
 const networkTarget=3; const netPct=Math.min(100,Math.round(s.networkActions/networkTarget*100));
 const selfPct=s.self.length?Math.round(s.selfPracticed/s.self.length*100):0;
 return `<div class="english-grid"><div class="eng-card eng-stat"><strong>${s.phrases.length}</strong><span>phrases stored</span></div><div class="eng-card eng-stat"><strong>${s.phraseUsed}</strong><span>phrases used/mastered</span></div><div class="eng-card eng-stat"><strong>${s.roleMin}m</strong><span>roleplay minutes</span></div><div class="eng-card eng-stat"><strong>${s.stories.length}</strong><span>career stories</span></div><div class="eng-card eng-stat"><strong>${s.network.length}</strong><span>network contacts/actions</span></div><div class="eng-card eng-stat"><strong>${s.self.length}</strong><span>self-presentation drafts</span></div><div class="eng-card eng-stat"><strong>${s.selfAvg||0}/5</strong><span>self confidence avg</span></div><div class="eng-card eng-stat"><strong>${s.networkActions}</strong><span>network actions this week</span></div></div><div class="eng-layout"><div class="eng-card"><h3>Weekly performance engine</h3><div class="eng-progress-row"><span>Phrases used</span><div class="eng-progress"><i style="width:${phrasePct}%"></i></div><b>${phrasePct}%</b></div><div class="eng-progress-row"><span>Roleplay min</span><div class="eng-progress"><i style="width:${rolePct}%"></i></div><b>${s.roleMin}/${roleTarget}</b></div><div class="eng-progress-row"><span>Stories practiced</span><div class="eng-progress"><i style="width:${storyPct}%"></i></div><b>${storyPct}%</b></div><div class="eng-progress-row"><span>Networking actions</span><div class="eng-progress"><i style="width:${netPct}%"></i></div><b>${s.networkActions}/${networkTarget}</b></div><div class="eng-progress-row"><span>Self-presentation</span><div class="eng-progress"><i style="width:${selfPct}%"></i></div><b>${selfPct}%</b></div><div class="section-break"></div><div class="eng-note"><b>Definition:</b> English Lab tracks performance outputs: phrases used, roleplays completed, stories built, networking actions, and executive self-presentation. Passive listening alone is not enough.</div></div><div class="eng-card"><h3>Recommended weekly outputs</h3><div class="eng-link-row"><div class="eng-prompt">Record one 60-second boss briefing in English.</div><div class="eng-prompt">Run one ChatGPT roleplay: stakeholder pushback or a leadership interview.</div><div class="eng-prompt">Add or practice one STAR/CAR story from real work.</div><div class="eng-prompt">Complete three weak-tie or workplace networking actions.</div><div class="eng-prompt">Improve one self-presentation answer: Tell me about yourself, strengths summary, or 90-day development plan.</div></div></div></div><div class="eng-layout"><div class="eng-card"><h3>Core by-products</h3><div class="eng-prompt-grid"><div class="eng-prompt">Social networking</div><div class="eng-prompt">Workplace networking</div><div class="eng-prompt">Stakeholder engagement</div><div class="eng-prompt">Idea pitching</div><div class="eng-prompt">Presentation</div><div class="eng-prompt">Storytelling</div><div class="eng-prompt">Self-exploration</div><div class="eng-prompt">Self-presentation</div></div></div><div class="eng-card"><h3>Fast actions</h3><div class="eng-actions"><button class="eng-mini-btn" onclick="setEnglishTab('phrases')">Add phrase</button><button class="eng-mini-btn" onclick="setEnglishTab('roleplay')">Log roleplay</button><button class="eng-mini-btn" onclick="setEnglishTab('stories')">Build story</button><button class="eng-mini-btn" onclick="setEnglishTab('networking')">Log networking</button><button class="eng-mini-btn" onclick="setEnglishTab('self')">Practice self-presentation</button></div><div class="section-break"></div><div class="eng-note">Use English Lab for reusable communication assets. Use Ideal Day for daily execution like shadowing, speaking time, and journal tasks.</div></div></div>`;
}

function selectedTasks(){
 const status=state.statusFilter||state.filter||'all';
 const tag=state.tagFilter||'all';
 const query=String(state.textFilter||'').trim().toLowerCase();
 let all=tasksForDate(state.selectedDate);
 if(tag&&tag!=='all') all=all.filter(t=>(t.tags||[]).includes(tag));
 if(query) all=all.filter(t=>taskMatchesText(t,query));
 let list=all;
 if(status==='done') list=all.filter(t=>getLog(state.selectedDate,t.id).status==='done');
 else if(status==='skipped') list=all.filter(t=>getLog(state.selectedDate,t.id).status==='skipped');
 else {
   list=queuedRowsForDate(state.selectedDate,list);
   if(status==='open') list=list.filter(t=>getLog(state.selectedDate,t.id).status==='open'&&!isOverdue(t,state.selectedDate));
   else if(status==='overdue') list=list.filter(t=>isOverdue(t,state.selectedDate));
   else if(status==='next'){
     list=list
       .filter(t=>taskNeedsActionNow(t,state.selectedDate))
       .sort((a,b)=>taskDateTime(a,state.selectedDate)-taskDateTime(b,state.selectedDate)||(a.title||'').localeCompare(b.title||''))
       .slice(0,1);
   }
 }
 return list.sort(sortTaskState);
}
function taskMatchesText(t,q){
 const tagText=(t.tags||[]).map(k=>{const tg=tagByKey(k);return `${k} ${tg.name||''} ${tg.icon||''}`}).join(' ');
 const parts=[t.title,t.desc,t.time,t.priority,t.alarmLabel,t.alarmTime,trackerLabel(t),tagText];
 return parts.join(' ').toLowerCase().includes(q);
}
function sortTaskState(a,b){
 const la=getLog(state.selectedDate,a.id), lb=getLog(state.selectedDate,b.id); const ra=rankTask(a,la), rb=rankTask(b,lb); if(ra!==rb)return ra-rb; return (a.time||'99:99').localeCompare(b.time||'99:99');
}
function rankTask(t,l){ if(l.status==='done')return 5; if(l.status==='skipped')return 6; if(isOverdue(t,state.selectedDate))return 4; if(isActiveNext(t))return 0; return 2;}
function openCount(date){return tasksForDate(date).filter(t=>getLog(date,t.id).status==='open').length}
function doneCount(date){return tasksForDate(date).filter(t=>getLog(date,t.id).status==='done').length}
function skippedCount(date){return tasksForDate(date).filter(t=>getLog(date,t.id).status==='skipped').length}
function effectiveCompletion(date){let list=tasksForDate(date);let denom=list.filter(t=>getLog(date,t.id).status!=='skipped').length;return denom?Math.round(doneCount(date)/denom*100):0}

function renderFilters(){const status=state.statusFilter||'all', tag=state.tagFilter||'all'; const activeCount=(status!=='all'?1:0)+(tag!=='all'?1:0)+((state.textFilter||'').trim()?1:0); const label=activeCount?`Filters · ${activeCount}`:'Filters'; const tagOpts=['<option value="all">All tags</option>',...tags().map(t=>`<option value="${esc(t.key)}" ${tag===t.key?'selected':''}>${t.icon} ${esc(t.name)}</option>`)].join(''); return `<details id="mobileFilterPanel" class="mobile-filter-panel"><summary><span class="mobile-filter-title">${label}</span><button class="filter-add-btn mobile-summary-add" type="button" title="Create task" aria-label="Create task" onclick="event.preventDefault();event.stopPropagation();openTaskFormModal()">+</button></summary><div class="filter-row compact-filters"><button class="filter-add-btn desktop-filter-add" type="button" title="Create task" aria-label="Create task" onclick="openTaskFormModal()">+</button><select class="filter-select" id="statusFilter" onchange="setStatusFilter(this.value)"><option value="all" ${status==='all'?'selected':''}>All status</option><option value="next" ${status==='next'?'selected':''}>Next Task</option><option value="open" ${status==='open'?'selected':''}>Open</option><option value="overdue" ${status==='overdue'?'selected':''}>Overdue</option><option value="done" ${status==='done'?'selected':''}>Done</option><option value="skipped" ${status==='skipped'?'selected':''}>Skipped</option></select><select class="filter-select tag-filter-select" id="tagFilter" onchange="setTagFilter(this.value)">${tagOpts}</select><input class="filter-search" id="taskTextFilter" value="${esc(state.textFilter||'')}" placeholder="Filter task text…" oninput="setTextFilter(this.value)"></div></details>`}
function trackerLabel(t){let tr=t.tracker||{type:'checkbox'};return tr.type||'checkbox'}
function timeToMinutes(hhmm){if(!hhmm||!/^\d{1,2}:\d{2}$/.test(hhmm))return null;let [h,m]=hhmm.split(':').map(Number);return h*60+m}
function minutesToTime(total){total=((Number(total)||0)%1440+1440)%1440;let h=Math.floor(total/60),m=total%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}
function taskDurationMins(t){let tr=t.tracker||{}; if(tr.type==='time'&&Number(tr.target)>0)return Number(tr.target); return 0}
function taskEndTime(t){let start=timeToMinutes(t.time);let dur=taskDurationMins(t);return start!==null&&dur?minutesToTime(start+dur):''}
function taskBlockDescription(t,date){return t.desc?esc(t.desc):''}
function taskProgressActual(t,date){
 const tr=t.tracker||{type:'checkbox'}, log=getLog(date,t.id);
 if(tr.type==='time')return (Number(log.timeSeconds)||0)/60;
 if(tr.type==='quantity')return Number(log.quantity)||0;
 if(tr.type==='count')return Number(log.count)||0;
 if(tr.type==='rating')return Number(log.rating)||0;
 if(tr.type==='nutrition'){
   const unit=String(tr.unit||'').toLowerCase();
   if(unit.includes('kcal')||unit.includes('cal'))return (log.nutrition||[]).reduce((sum,x)=>sum+(nutritionFor(x.foodId,x.qty).calories||0),0);
   return (log.nutrition||[]).reduce((sum,x)=>sum+(Number(x.qty)||0),0);
 }
 if(tr.type==='measurement')return (log.measurements||[]).length;
 if(tr.type==='notes')return log.notes?1:0;
 return (log.status==='done'||log.status==='skipped')?1:0;
}
function taskProgressVisualClass(t,date){
 const log=getLog(date,t.id), tr=t.tracker||{type:'checkbox'}, status=log.status||'open';
 if(status==='done')return 'done';
 if(status==='skipped')return 'skipped';
 if(!taskHasProgress(t,date,log))return 'open';
 const target=Number(tr.target)||0, actual=taskProgressActual(t,date);
 if(target>0&&actual+0.0001>=target)return 'done';
 return 'partial';
}
function trackerSummaryShort(t,date){
 const tr=t.tracker||{type:'checkbox'},log=getLog(date,t.id);
 if(tr.type==='time'){
  const mins=Math.round((log.timeSeconds||0)/60);
  return minsToText(mins)+(tr.target?' / '+minsToText(Number(tr.target)):'');
 }
 if(tr.type==='quantity'){
  const val=log.quantity||0;
  return val+(tr.unit||'')+(tr.target?' / '+tr.target+(tr.unit||''):'');
 }
 if(tr.type==='nutrition'){
  const items=log.nutrition||[];
  if(!items.length)return '\u2014';
  const kcal=Math.round(items.reduce((s,x)=>s+(nutritionFor(x.foodId,x.qty).calories||0),0));
  return items.length+(items.length!==1?' logs':' log')+' \u00b7 '+kcal+' kcal';
 }
 if(tr.type==='count'){
  return (log.count||0)+(tr.target?' / '+tr.target:'');
 }
 if(tr.type==='measurement'){
  const last=(log.measurements||[]).at(-1);
  return last?measurementEntryText(t,last):'\u2014';
 }
 if(tr.type==='rating'){return log.rating?log.rating+' / 5':'\u2014'}
 if(tr.type==='notes'){return log.notes?'Notes added':'\u2014'}
 return '\u2014';
}

function taskProgressChipHtml(t,date){
 const tr=t.tracker||{type:'checkbox'},log=getLog(date,t.id),status=log.status||'open';
 // Checkbox: only emit row when actioned
 if(tr.type==='checkbox'){
  if(status==='open')return '';
  const s=status==='done'?'done':'skipped';
  const label=status==='done'?'Done':'Skipped';
  return '<div class="task-progress-row '+s+'"><span class="tpr-dot"></span><b class="tpr-val">'+label+'</b></div>';
 }
 // Measurement, rating, notes: only emit when data exists
 const value=trackerSummaryShort(t,date);
 if((['measurement','rating','notes'].includes(tr.type))&&value==='\u2014')return '';
 const state=taskProgressVisualClass(t,date);
 // Bar: ONLY for time, quantity, count with a defined target > 0
 // NOT for nutrition (multi-dimensional data), measurement, rating, notes
 let barHtml='';
 if(['time','quantity','count'].includes(tr.type)&&Number(tr.target)>0){
  let actual=0;
  if(tr.type==='time')actual=(Number(log.timeSeconds)||0)/60;
  else if(tr.type==='quantity')actual=Number(log.quantity)||0;
  else if(tr.type==='count')actual=Number(log.count)||0;
  const pct=Math.min(100,Math.round(actual/Number(tr.target)*100));
  barHtml='<span class="tpr-bar" title="'+pct+'% of target"><span style="width:'+pct+'%"></span></span>';
 }
 return '<div class="task-progress-row '+state+'"><span class="tpr-dot"></span><b class="tpr-val">'+esc(value)+'</b>'+barHtml+'</div>';
}

function taskProgressLine(t,date){
 const tr=t.tracker||{type:'checkbox'}, log=getLog(date,t.id), status=log.status||'open';
 if(tr.type==='checkbox')return status==='done'?'Completed':status==='skipped'?'Skipped':'Open';

}

function trackerSummary(t,date){
 const tr=t.tracker||{type:'checkbox'}, log=getLog(date,t.id); if(tr.type==='time'){let mins=Math.round((log.timeSeconds||0)/60);return `${minsToText(mins)} tracked${tr.target?' / '+minsToText(tr.target):''}`}
 if(tr.type==='quantity'){return `${log.quantity||0}${tr.unit||''}${tr.target?' / '+tr.target+(tr.unit||''):''}`}
 if(tr.type==='nutrition'){let total=(log.nutrition||[]).reduce((s,x)=>s+nutritionFor(x.foodId,x.qty).calories,0);return `${(log.nutrition||[]).length} logs · ${Math.round(total)} kcal`}
 if(tr.type==='count'){return `${log.count||0}${tr.target?' / '+tr.target:''}`}
 if(tr.type==='measurement'){let last=(log.measurements||[]).at(-1);return last?`Last: ${esc(measurementEntryText(t,last))}`:'No measurement logged'}
 if(tr.type==='rating'){return `${log.rating||0} / 5`}
 if(tr.type==='notes'){return log.notes?`Notes added`:'No notes yet'}
 return log.status==='done'?'Completed':'Checkbox';
}

function deleteTaskInstance(id){

function trackerFieldSuggestions(type,context=''){

  if(/step|walk/.test(q))return {unit:'steps',target:'8000',quick:'1000'};

  if(/step|walk/.test(q))return {unit:'steps',target:'8000',quick:'1000'};
  return {unit:'reps',target:'10',quick:'1,5'};
 }
 if(type==='measurement'){
  if(/blood pressure|bp/.test(q))return {unit:'mmHg',target:'',quick:''};
  if(/glucose|blood sugar|sugar/.test(q))return {unit:'mg/dL',target:'',quick:''};
  if(/waist|height|length/.test(q))return {unit:'cm',target:'',quick:''};

function parseFormDates(input){
 const raw=String(input||'').trim(); if(!raw)return [];
 const spec=raw.match(/^([a-z]{3,9})\(([^)]+)\)$/i);
 if(spec){const mi=monthIndexFromName(spec[1]); const year=parseIso(state.selectedDate).getFullYear(); return spec[2].split(',').map(x=>Number(x.trim())).filter(Boolean).map(day=>isoDate(new Date(year,mi<0?0:mi,day)));}
 return raw.split(',').map(x=>x.trim()).filter(Boolean).map(x=>{if(/^\d{4}-\d{2}-\d{2}$/.test(x))return x; const d=new Date(x); return isNaN(d)?null:isoDate(d);}).filter(Boolean);
}

function updateTaskAlarm(taskId,alarmId,field,value){
 let all=tasks(), t=all.find(x=>x.id===taskId); if(!t)return;
 t.alarms=Array.isArray(t.alarms)?t.alarms:[];

function minutesFromHHMM(t){const m=String(t||'').match(/^(\d{1,2}):(\d{2})$/);return m?Number(m[1])*60+Number(m[2]):null}
function unlockAlarmAudio(){
 try{
   const Ctx=window.AudioContext||window.webkitAudioContext;
   if(!Ctx){state.alarmAudioUnlocked=false;return Promise.resolve(false);}
   if(!state.alarmAudioCtx) state.alarmAudioCtx=new Ctx();
   const ctx=state.alarmAudioCtx;
   const done=()=>{state.alarmAudioUnlocked=(ctx.state==='running');return state.alarmAudioUnlocked};
   if(ctx.state==='suspended') return ctx.resume().then(done).catch(()=>false);
   state.alarmAudioUnlocked=(ctx.state==='running');
   return Promise.resolve(state.alarmAudioUnlocked);
 }catch(e){state.alarmAudioUnlocked=false;return Promise.resolve(false);}
}
function playAlarmSound(durationMs=5000){
 try{
   const run=()=>{
     try{
       const ctx=state.alarmAudioCtx;
       if(!ctx || ctx.state!=='running')return false;
       const now=ctx.currentTime;
       const total=Math.max(5000, Number(durationMs)||5000);
       const step=.42;
       const count=Math.ceil(total/(step*1000));
       for(let i=0;i<count;i++){
         const t0=now+i*step;
         const osc=ctx.createOscillator(), gain=ctx.createGain();
         osc.type=i%2?'square':'sine';
         osc.frequency.setValueAtTime(i%2?930:690,t0);
         gain.gain.setValueAtTime(0.0001,t0);
         gain.gain.exponentialRampToValueAtTime(0.24,t0+.025);
         gain.gain.exponentialRampToValueAtTime(0.0001,t0+.30);
         osc.connect(gain); gain.connect(ctx.destination);
         osc.start(t0); osc.stop(t0+.32);
       }
       return true;
     }catch(e){console.warn('Alarm sound failed',e);return false;}
   };
   const p=unlockAlarmAudio();
   if(p && typeof p.then==='function') p.then(ok=>{if(ok)run(); else toast('Sound blocked: click anywhere in LifeOS once.');});
   else run();
 }catch(e){console.warn('Alarm sound failed',e);}
}
function clearAlarmRepeatRings(){
 (state.alarmRepeatTimers||[]).forEach(x=>clearTimeout(x));
 state.alarmRepeatTimers=[];
}
function activeAlarmKey(){return state.activeAlarmKey||'';}
function markAlarmResponded(){

}
function scheduleAlarmRepeatRings(t,a,date){
 clearAlarmRepeatRings();
 state.activeAlarmKey=alarmKey(date,t.id,a.id);
 state.activeAlarmResponded=false;
 [30000,60000,90000].forEach(ms=>{
   state.alarmRepeatTimers.push(setTimeout(()=>{
     if(state.activeAlarmResponded)return;
     if(activeAlarmKey()!==alarmKey(date,t.id,a.id))return;
     const log=getLog(date,alarmLogId(t.id,a.id));
     if(log.status==='done'||log.status==='skipped'){markAlarmResponded();return;}
     playAlarmSound(5000);
     const box=document.querySelector('#alarmPopupModal .alarm-alert-box');
     if(box){box.classList.remove('ring');void box.offsetWidth;box.classList.add('ring');}
   },ms));
 });
}

function fireTaskAlarm(t,a,date){
  try{
    const title='LifeOS alarm';
    const body=`${t.title||'Task'}${a.label?' — '+a.label:''}`;
    toast('Alarm: '+body);
    showAlarmPopup(t,a,date);
    const box=document.querySelector('#alarmPopupModal .alarm-alert-box');
    if(box) box.classList.add('ring');
    playAlarmSound(5000);
    scheduleAlarmRepeatRings(t,a,date);
    if('Notification' in window && Notification.permission==='granted'){
      try{ new Notification(title,{body}); }catch(e){}
    }
    showAlarmEngineNote('Alarm fired: '+(t.title||'Task'));
  }catch(e){
    console.error('Alarm fire failed', e);
    toast('Alarm: '+(t?.title||'Task')+' '+(a?.time||''));
    const m=$('#alarmPopupModal');
    if(m){
      m.innerHTML='<div class="alarm-alert-box"><div class="alarm-alert-head"><div class="alarm-alert-title">Alarm due</div><button class="modal-close" onclick="closeAlarmPopup()">×</button></div><div class="alarm-alert-body"><div class="alarm-alert-task">'+esc(t?.title||'Task')+'</div><div class="alarm-alert-note">'+esc(a?.time||'')+'</div><div class="alarm-alert-actions"><button class="tiny-btn" onclick="closeAlarmPopup()">Dismiss</button></div></div></div>';
      m.classList.add('open');
    }
    playAlarmSound(5000);
    scheduleAlarmRepeatRings(t,a,date);
  }
}
function checkTaskAlarms(){
 const today=isoDate(new Date()), now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
 const st=settings(); st.firedAlarms=st.firedAlarms||{};
 baseTasksForDate(today).forEach(t=>{
   activeAlarms(t,today).forEach(a=>{
     const alarmMin=minutesFromHHMM(a.time); if(alarmMin===null)return;
     const minutesLate=nowMin-alarmMin;
     if(minutesLate<0 || minutesLate>10)return;
     const logId=alarmLogId(t.id,a.id), log=getLog(today,logId); if(log.status==='done'||log.status==='skipped')return;
     const key=alarmKey(today,t.id,a.id);
     if(st.firedAlarms[key])return;
     st.firedAlarms[key]=new Date().toISOString();
     fireTaskAlarm(t,a,today);
   });
 });
 Object.keys(st.firedAlarms).forEach(k=>{if(!k.startsWith(today+'|'))delete st.firedAlarms[k];});
 save(K.settings,st);
}

/* ============================================================
   v2.7.6 — Robust alarm engine rewire
   - Adds timeout-based scheduling in addition to interval polling
   - Shows a persistent diagnostic note briefly when armed/fired
   - Makes Test Alarm a direct guaranteed in-app popup + sound attempt
   - Rechecks and reschedules after alarm edits
============================================================ */
function showAlarmEngineNote(text, persist=false){
  const box=$('#alarmEngineNote'), span=$('#alarmEngineText');
  if(!box||!span)return;
  if(!text){clearTimeout(state.alarmNoteTimer);box.classList.remove('show');span.textContent='';return;}
  span.textContent=text;
  box.classList.add('show');
  clearTimeout(state.alarmNoteTimer);
  if(!persist) state.alarmNoteTimer=setTimeout(()=>box.classList.remove('show'),3500);
}
function clearAlarmTimeouts(){
  (state.alarmTimeouts||[]).forEach(x=>clearTimeout(x));
  state.alarmTimeouts=[];
}
function alarmDueWindowMinutes(){return 15;}
function eligibleAlarmTasksForDate(dateIso){
 return tasks().filter(t=>(Array.isArray(t.alarms)?t.alarms:[]).some(a=>{
   if(!a||a.enabled===false||!a.time)return false;
   const occurs=(dueOn(t,dateIso)&&alarmRepeatsOnDate(a,dateIso))||(a.repeat===false&&a.date===dateIso);
   return occurs&&alarmBehaviorForDate(t,a,dateIso)!=='off';
 }));
}
function alreadyFiredAlarm(st,key){return !!(st.firedAlarms&&st.firedAlarms[key]);}
function setFiredAlarm(st,key){st.firedAlarms=st.firedAlarms||{}; st.firedAlarms[key]=new Date().toISOString();}
function fireTaskAlarm(t,a,date){
  try{
    const title='LifeOS alarm';
    const body=`${t.title||'Task'}${a.label?' — '+a.label:''}`;
    toast('Alarm: '+body);
    showAlarmPopup(t,a,date);
    const box=document.querySelector('#alarmPopupModal .alarm-alert-box');
    if(box) box.classList.add('ring');
    playAlarmSound();
    if('Notification' in window && Notification.permission==='granted'){
      try{ new Notification(title,{body}); }catch(e){}
    }
    showAlarmEngineNote('Alarm fired: '+(t.title||'Task'));
  }catch(e){
    console.error('Alarm fire failed', e);
    toast('Alarm: '+(t?.title||'Task')+' '+(a?.time||''));
    const m=$('#alarmPopupModal');
    if(m){
      m.innerHTML='<div class="alarm-alert-box"><div class="alarm-alert-head"><div class="alarm-alert-title">Alarm due</div><button class="modal-close" onclick="closeAlarmPopup()">×</button></div><div class="alarm-alert-body"><div class="alarm-alert-task">'+esc(t?.title||'Task')+'</div><div class="alarm-alert-note">'+esc(a?.time||'')+'</div><div class="alarm-alert-actions"><button class="tiny-btn" onclick="closeAlarmPopup()">Dismiss</button></div></div></div>';
      m.classList.add('open');
    }
  }
}
function checkTaskAlarms(){
  const today=isoDate(new Date());
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const st=settings();
  st.firedAlarms=st.firedAlarms||{};
  let fired=0;
  eligibleAlarmTasksForDate(today).forEach(t=>{
    activeAlarms(t,today).forEach(a=>{
      const alarmMin=minutesFromHHMM(a.time); if(alarmMin===null)return;
      const minutesLate=nowMin-alarmMin;
      // Fire at the due minute or any time within the tolerance window.
      if(minutesLate<0 || minutesLate>alarmDueWindowMinutes())return;
      const logId=alarmLogId(t.id,a.id), log=getLog(today,logId);
      if(log.status==='done'||log.status==='skipped')return;
      const key=alarmKey(today,t.id,a.id);
      if(alreadyFiredAlarm(st,key))return;
      setFiredAlarm(st,key);
      fired++;
      fireTaskAlarm(t,a,today);
    });
  });
  Object.keys(st.firedAlarms).forEach(k=>{if(!k.startsWith(today+'|'))delete st.firedAlarms[k];});
  save(K.settings,st);
  return fired;
}
function nextAlarmDue(){
  const today=isoDate(new Date());
  const now=new Date();
  const nowMs=now.getTime();
  let next=null;
  eligibleAlarmTasksForDate(today).forEach(t=>{
    activeAlarms(t,today).forEach(a=>{
      const m=minutesFromHHMM(a.time); if(m===null)return;
      const due=new Date(now.getFullYear(),now.getMonth(),now.getDate(),Math.floor(m/60),m%60,0,0);
      const log=getLog(today,alarmLogId(t.id,a.id));
      if(log.status==='done'||log.status==='skipped')return;
      const key=alarmKey(today,t.id,a.id);
      if(settings().firedAlarms&&settings().firedAlarms[key])return;
      if(due.getTime()>=nowMs-60000){
        if(!next||due.getTime()<next.due.getTime())next={task:t,alarm:a,date:today,due};
      }
    });
  });
  return next;
}
function scheduleAlarmTimeouts(){
  clearAlarmTimeouts();
  const next=nextAlarmDue();
  if(!next){showAlarmEngineNote(''); return;}
  const delay=Math.max(0,next.due.getTime()-Date.now());
  // Use one exact timeout plus polling backup. Cap huge delays because browsers throttle long timers.
  const capped=Math.min(delay,30*60*1000);
  state.alarmTimeouts.push(setTimeout(()=>{checkTaskAlarms(); scheduleAlarmTimeouts();}, capped+250));
  // Do not nag all day. Show the small engine note only within 1 minute of the next alarm.
  if(delay<=60000){
    const secs=Math.max(0,Math.ceil(delay/1000));
    showAlarmEngineNote(`Next alarm in ${secs}s · ${next.alarm.time} · ${next.task.title||'Task'}`, true);
  }else{
    showAlarmEngineNote('');
  }
}
function startAlarmMonitor(){
  clearInterval(state.alarmInterval);
  clearAlarmTimeouts();
  document.addEventListener('pointerdown',unlockAlarmAudio,{once:true});
  document.addEventListener('keydown',unlockAlarmAudio,{once:true});
  // Run immediately and then poll frequently enough not to miss minute boundaries.
  try{checkTaskAlarms();}catch(e){console.error('Initial alarm check failed',e)}
  scheduleAlarmTimeouts();
  state.alarmInterval=setInterval(()=>{try{checkTaskAlarms(); scheduleAlarmTimeouts();}catch(e){console.error('Alarm monitor failed',e)}},5000);
}
function testTaskAlarm(taskId){
  const t=taskByAnyId(taskId)||tasks().find(x=>x.id===taskId);
  if(!t){alert('No task found for alarm test.');return;}
  const a=(activeAlarms(t,state.selectedDate)[0])||{id:'test_'+Date.now(),time:(t.time||'09:00'),label:'Test alarm',enabled:true,repeat:true};
  // Directly fire. Do not mark it fired; this is diagnostic.
  fireTaskAlarm(t,a,state.selectedDate||isoDate(new Date()));
}
function refreshAlarmEngineSoon(){setTimeout(()=>{try{checkTaskAlarms();scheduleAlarmTimeouts();}catch(e){console.error('Alarm refresh failed',e)}},50)}

updateTaskAlarm=function(taskId,alarmId,field,value){__lifeosUpdateTaskAlarm(taskId,alarmId,field,value); refreshAlarmEngineSoon();}
const __lifeosDeleteTaskAlarm=deleteTaskAlarm;

  role:[['prepared','Prepare'],['practiced','Practice'],['recorded','Record'],['feedback','Feedback'],['retried','Retry'],['transferred','Use at work']],

function mergeById(existing,seeds){const map=new Map((existing||[]).map(x=>[x.id,x]));seeds.forEach(seed=>{const old=map.get(seed.id);if(old){map.set(seed.id,{...seed,...old,progress:{...(seed.progress||{}),...(old.progress||{})}})}else map.set(seed.id,seed)});return Array.from(map.values())}
function ensureEnglishStarterContent(){const settings=load(K.settings,{}); if(settings.englishSeedVersion===ENG_SEED_VERSION)return; saveEngPhrases(mergeById(engPhrases(),ENG_SEED_PHRASES)); saveEngRoleplays(mergeById(engRoleplays(),ENG_SEED_ROLEPLAYS)); saveEngStories(mergeById(engStories(),ENG_SEED_STORIES)); save(K.settings,{...settings,englishSeedVersion:ENG_SEED_VERSION,englishSeededAt:new Date().toISOString()});}
function progressPct(item,type){const labels=ENG_PROGRESS_LABELS[type]||[]; if(!labels.length)return 0; const p=item.progress||{}; return Math.round(labels.filter(([k])=>p[k]).length/labels.length*100)}
function renderEngProgress(item,type,store){const labels=ENG_PROGRESS_LABELS[type]||[];return `<div class="eng-item-progress">${labels.map(([k,label])=>`<button class="eng-check ${item.progress&&item.progress[k]?'done':''}" onclick="toggleEngProgress('${store}','${item.id}','${k}')">${item.progress&&item.progress[k]?'✓':'○'} ${label}</button>`).join('')}</div>`}
function toggleEngProgress(store,id,key){const getter=store==='phrases'?engPhrases:store==='roleplays'?engRoleplays:engStories;const saver=store==='phrases'?saveEngPhrases:store==='roleplays'?saveEngRoleplays:saveEngStories;const arr=getter();const item=arr.find(x=>x.id===id);if(!item)return;item.progress=item.progress||{};item.progress[key]=!item.progress[key];if(store==='phrases'){if(key==='usedReal'&&item.progress[key]){item.status='Used';item.lastUsed=isoDate(new Date())} if(key==='mastered'&&item.progress[key])item.status='Mastered'} if(store==='stories'&&(key==='practiced'||key==='usedReal')&&item.progress[key])item.lastPracticed=isoDate(new Date()); if(store==='roleplays'&&(key==='practiced'||key==='transferred')&&item.progress[key])item.date=isoDate(new Date());saver(arr);renderEnglishLab()}
function renderEnglishDashboard(){const phrases=engPhrases(),roles=engRoleplays(),stories=engStories(),network=engNetworking(),self=engSelfPresentation();const phraseDone=phrases.filter(p=>progressPct(p,'phrase')>=80||p.status==='Mastered').length;const avgPhrase=phrases.length?Math.round(phrases.reduce((a,p)=>a+progressPct(p,'phrase'),0)/phrases.length):0;const avgRole=roles.length?Math.round(roles.reduce((a,r)=>a+progressPct(r,'role'),0)/roles.length):0;const avgStory=stories.length?Math.round(stories.reduce((a,s)=>a+progressPct(s,'story'),0)/stories.length):0;const roleMin=roles.reduce((s,r)=>s+(Number(r.duration)||0),0);const selfAvg=self.length?Math.round(self.reduce((sum,x)=>sum+(Number(x.confidence)||0),0)/self.length*10)/10:0;return `<div class="english-grid"><div class="eng-card eng-stat"><strong>${phrases.length}</strong><span>phrase patterns</span></div><div class="eng-card eng-stat"><strong>${phraseDone}</strong><span>phrases near mastered</span></div><div class="eng-card eng-stat"><strong>${roles.length}</strong><span>roleplay scenarios</span></div><div class="eng-card eng-stat"><strong>${stories.length}</strong><span>story templates</span></div><div class="eng-card eng-stat"><strong>${network.length}</strong><span>network entries</span></div><div class="eng-card eng-stat"><strong>${self.length}</strong><span>self-presentation drafts</span></div><div class="eng-card eng-stat"><strong>${roleMin}m</strong><span>logged roleplay min</span></div><div class="eng-card eng-stat"><strong>${selfAvg||0}/5</strong><span>self confidence avg</span></div></div><div class="eng-layout"><div class="eng-card"><h3>English performance library</h3><div class="eng-progress-row"><span>Phrase bank progress</span><div class="eng-progress"><i style="width:${avgPhrase}%"></i></div><b>${avgPhrase}%</b></div><div class="eng-progress-row"><span>Roleplay scenario progress</span><div class="eng-progress"><i style="width:${avgRole}%"></i></div><b>${avgRole}%</b></div><div class="eng-progress-row"><span>Story vault progress</span><div class="eng-progress"><i style="width:${avgStory}%"></i></div><b>${avgStory}%</b></div><div class="eng-source-note">Seeded from workplace fluency, mediation, public speaking, storytelling, weak-tie networking and task-based practice frameworks. Add new content only when you discover a missing pattern.</div></div><div class="eng-card"><h3>Recommended weekly operating rhythm</h3><ul style="padding-left:18px;color:var(--text-2);line-height:1.8"><li>Use 3 phrases in real email/meeting contexts.</li><li>Practice 1 stakeholder or Director-level roleplay.</li><li>Record 1 career story in 60 seconds.</li><li>Make 1 weak-tie or workplace networking action.</li><li>Update one self-presentation answer after feedback.</li></ul></div></div>`}

function renderRoleplayLab(){const list=engRoleplays().sort((a,b)=>(progressPct(a,'role')-progressPct(b,'role'))||String(a.difficulty).localeCompare(b.difficulty)||String(a.scenario).localeCompare(b.scenario));return `<div class="eng-toolbar"><div class="eng-toolbar-left"><div class="eng-toolbar-title">Roleplay Lab</div><div class="eng-toolbar-note">${list.length} pressure scenarios. Work through checklist; add only new scenarios you actually encounter.</div></div><button class="eng-icon-add" title="Add missing roleplay" onclick="openRoleplayModal()">＋</button></div><div class="eng-list-wide">${list.map(renderRoleplayItem).join('')}</div>`}

function englishMergeById(existing,seeds){const map=new Map((existing||[]).map(x=>[x.id,x]));(seeds||[]).forEach(seed=>{const old=map.get(seed.id);if(old){map.set(seed.id,{...seed,...old,progress:{...(seed.progress||{}),...(old.progress||{})}})}else map.set(seed.id,seed)});return Array.from(map.values())}
function ensureEnglishStarterContent(){const settings=load(K.settings,{}); if(settings.englishSeedVersion===ENG_SEED_VERSION_293)return; saveEngPhrases(englishMergeById(engPhrases(),ENG_SEED_PHRASES_293)); saveEngRoleplays(englishMergeById(engRoleplays(),ENG_SEED_ROLEPLAYS_293)); saveEngStories(englishMergeById(engStories(),ENG_SEED_STORIES_293)); saveEngNetworking(englishMergeById(engNetworking(),ENG_SEED_NETWORKING_293)); saveEngSelfPresentation(englishMergeById(engSelfPresentation(),ENG_SEED_SELF_293)); save(K.settings,{...settings,englishSeedVersion:ENG_SEED_VERSION_293,englishSeededAt:new Date().toISOString()});}
function englishStoreAccess(store){if(store==='phrases')return [engPhrases,saveEngPhrases,'phrase']; if(store==='roleplays')return [engRoleplays,saveEngRoleplays,'role']; if(store==='stories')return [engStories,saveEngStories,'story']; if(store==='networking')return [engNetworking,saveEngNetworking,'network']; if(store==='self')return [engSelfPresentation,saveEngSelfPresentation,'self']; return [()=>[],()=>{},''];}
function progressPct(item,type){const labels=ENG_PROGRESS_LABELS_293[type]||[]; if(!labels.length)return 0; const p=item.progress||{}; return Math.round(labels.filter(([k])=>p[k]).length/labels.length*100)}
function renderEngProgress(item,type,store){const labels=ENG_PROGRESS_LABELS_293[type]||[];return `<div class="eng-item-progress">${labels.map(([k,label])=>`<button class="eng-check ${item.progress&&item.progress[k]?'done':''}" onclick="toggleEngProgress('${store}','${item.id}','${k}')">${item.progress&&item.progress[k]?'✓':'○'} ${label}</button>`).join('')}</div>`}
function toggleEngProgress(store,id,key){const [getter,saver,type]=englishStoreAccess(store);const arr=getter();const item=arr.find(x=>x.id===id);if(!item)return;item.progress=item.progress||{};item.progress[key]=!item.progress[key];const today=isoDate(new Date());if(store==='phrases'){if(key==='usedReal'&&item.progress[key]){item.status='Used';item.lastUsed=today} if(key==='mastered'&&item.progress[key])item.status='Mastered'} if(store==='stories'&&(key==='practiced'||key==='usedReal')&&item.progress[key])item.lastPracticed=today; if(store==='roleplays'&&(key==='practiced'||key==='transferred')&&item.progress[key])item.date=today; if(store==='networking'){if((key==='contacted'||key==='maintained')&&item.progress[key])item.lastContact=today; if(key==='followedUp'&&item.progress[key])item.nextFollow='';} if(store==='self'){if((key==='practiced'||key==='recorded'||key==='refined')&&item.progress[key])item.lastPracticed=today; item.updatedAt=new Date().toISOString();} saver(arr);renderEnglishLab()}

function renderEnglishDashboard(){const phrases=engPhrases(),roles=engRoleplays(),stories=engStories(),network=engNetworking(),self=engSelfPresentation();const avg=(arr,type)=>arr.length?Math.round(arr.reduce((a,x)=>a+progressPct(x,type),0)/arr.length):0;const roleMin=roles.reduce((s,r)=>s+(Number(r.duration)||0),0);const selfAvg=self.length?Math.round(self.reduce((sum,x)=>sum+(Number(x.confidence)||0),0)/self.length*10)/10:0;const mastered=phrases.filter(p=>progressPct(p,'phrase')>=80||p.status==='Mastered').length;return `<div class="english-grid"><div class="eng-card eng-stat"><strong>${phrases.length}</strong><span>phrase patterns</span></div><div class="eng-card eng-stat"><strong>${roles.length}</strong><span>roleplay scenarios</span></div><div class="eng-card eng-stat"><strong>${stories.length}</strong><span>story templates</span></div><div class="eng-card eng-stat"><strong>${network.length}</strong><span>networking plays</span></div><div class="eng-card eng-stat"><strong>${self.length}</strong><span>self-presentation drafts</span></div><div class="eng-card eng-stat"><strong>${mastered}</strong><span>phrases near mastered</span></div><div class="eng-card eng-stat"><strong>${roleMin}m</strong><span>logged roleplay min</span></div><div class="eng-card eng-stat"><strong>${selfAvg||0}/5</strong><span>self confidence avg</span></div></div><div class="eng-layout"><div class="eng-card"><h3>Library readiness</h3><div class="eng-progress-row"><span>Phrase Bank</span><div class="eng-progress"><i style="width:${avg(phrases,'phrase')}%"></i></div><b>${avg(phrases,'phrase')}%</b></div><div class="eng-progress-row"><span>Roleplays</span><div class="eng-progress"><i style="width:${avg(roles,'role')}%"></i></div><b>${avg(roles,'role')}%</b></div><div class="eng-progress-row"><span>Story Vault</span><div class="eng-progress"><i style="width:${avg(stories,'story')}%"></i></div><b>${avg(stories,'story')}%</b></div><div class="eng-progress-row"><span>Networking</span><div class="eng-progress"><i style="width:${avg(network,'network')}%"></i></div><b>${avg(network,'network')}%</b></div><div class="eng-progress-row"><span>Self-present</span><div class="eng-progress"><i style="width:${avg(self,'self')}%"></i></div><b>${avg(self,'self')}%</b></div><div class="eng-source-note">v2.9.3 is a seeded performance library. User addition is only for missing phrases, scenarios, stories, contacts, or self-presentation answers discovered in real life.</div></div><div class="eng-card"><h3>How to use this module</h3><div class="eng-prompt-grid"><div class="eng-prompt">Pick the lowest-progress phrase and use it in writing/speaking.</div><div class="eng-prompt">Pick one roleplay, edit the sample conversation, then record yourself.</div><div class="eng-prompt">Pick one story, polish the 60-sec version, then practice aloud.</div><div class="eng-prompt">Pick one networking play, contact once, follow up later.</div><div class="eng-prompt">Pick one self-presentation prompt and refine after feedback.</div><div class="eng-prompt">Add new items only when real life exposes a missing pattern.</div></div></div></div>`}

/* v2.9.8 — English Lab text filters + final table polish hooks */
function englishFilterValue(tab){ state.englishFilters=state.englishFilters||{}; return state.englishFilters[tab]||''; }
function setEnglishFilter(tab,value){
 state.englishFilters=state.englishFilters||{};
 state.englishFilters[tab]=value||'';
 renderEnglishLab();
 setTimeout(()=>{const el=document.getElementById('engFilter_'+tab); if(el){el.focus(); const n=el.value.length; try{el.setSelectionRange(n,n)}catch(e){}}},0);
}
function flattenEnglishItem(v,depth=0){
 if(v===null||v===undefined||depth>5) return '';
 if(Array.isArray(v)) return v.map(x=>flattenEnglishItem(x,depth+1)).join(' ');
 if(typeof v==='object') return Object.keys(v).filter(k=>k!=='progress').map(k=>flattenEnglishItem(v[k],depth+1)).join(' ');
 return String(v);
}
function englishItemMatches(item,q){
 q=(q||'').toLowerCase().trim();
 if(!q) return true;
 const text=flattenEnglishItem(item).toLowerCase();
 return q.split(/\s+/).filter(Boolean).every(term=>text.includes(term));
}
function filterEnglishList(tab,list){const q=englishFilterValue(tab); return (list||[]).filter(x=>englishItemMatches(x,q));}
function englishToolbarActions(tab,total,shown,placeholder,addTitle,addFn){
 const q=englishFilterValue(tab);
 return `<div class="eng-toolbar-actions"><div class="eng-filter-wrap"><input class="eng-filter-input" id="engFilter_${tab}" value="${esc(q)}" placeholder="${esc(placeholder)}" oninput="setEnglishFilter('${tab}',this.value)"><span class="eng-filter-count">${shown}/${total}</span></div><button class="eng-icon-add" title="${esc(addTitle)}" onclick="${addFn}">＋</button></div>`;
}
function renderEnglishEmpty(tab){const q=englishFilterValue(tab); return `<div class="eng-empty filtered">No matching items${q?` for “${esc(q)}”`:''}. Clear the filter or add a missing item with the ＋ button.</div>`;}

 const raw=engPhrases().sort((a,b)=>(progressPct(a,'phrase')-progressPct(b,'phrase'))||String(a.category).localeCompare(b.category)||String(a.text).localeCompare(b.text));
 const list=filterEnglishList('phrases',raw);
 return `<div class="eng-toolbar"><div class="eng-toolbar-left"><div class="eng-toolbar-title">Phrase Bank</div><div class="eng-toolbar-note">${phraseCoverageSummary(raw)}. Use seeded patterns first; add only missing real-life patterns.</div></div>${englishToolbarActions('phrases',raw.length,list.length,'Filter phrases, categories, use cases…','Add missing phrase','openPhraseModal()')}</div><div class="eng-list-wide">${list.length?list.map(renderPhraseItem).join(''):renderEnglishEmpty('phrases')}</div>`;
}

function lifeosProgressIconSvg(){
  return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v9h9"></path><path d="M21 12a9 9 0 1 1-9-9"></path></svg>';
}

function toggleMobileFilterPanel(force){
 const wrap=document.querySelector('.planner-main>.quick-box');
 const panel=document.getElementById('mobileFilterPanel');
 if(!wrap||!panel)return;
 const next=typeof force==='boolean'?force:!wrap.classList.contains('mobile-filters-open');

function renderFilters(){
 const status=state.statusFilter||'all', tag=state.tagFilter||'all';

 const label=activeCount?`Filters · ${activeCount}`:'Filters';
 const tagOpts=['<option value="all">All tags</option>',...tags().map(t=>`<option value="${esc(t.key)}" ${tag===t.key?'selected':''}>${t.icon} ${esc(t.name)}</option>`)].join('');

}
function renderTaskCard(t){
 const id=taskLogId(t), pid=taskParentId(t), log=getLog(state.selectedDate,id), status=log.status||'open';
 const overdue=isOverdue(t,state.selectedDate), active=isActiveNext(t), locked=isFutureDate(state.selectedDate);
 const cls=['task-card',status==='done'?'done':'',status==='skipped'?'skipped':'',overdue?'overdue':'',active?'active-next':'',t.isAlarmOccurrence?'alarm-occurrence':''].filter(Boolean).join(' ');
 const tagHtml=(t.tags||[]).map(k=>{let tg=tagByKey(k);return `<span class="tag-pill" style="color:${tg.color};background:${tg.color}18"><span>${tg.icon}</span>${esc(tg.name)}</span>`}).join('');
 const end=taskEndTime(t), desc=taskBlockDescription(t,state.selectedDate);
 const progressBtn=`<button type="button" class="mobile-tag-progress-btn" title="Open progress calendar" aria-label="Open progress calendar" onclick="openTaskCalendarModal('${pid}')">${lifeosProgressIconSvg()}</button>`;
 return `<article class="${cls}" data-task="${id}" data-parent-task="${pid}">
  <div class="task-time-cell" title="Scheduled time"><div class="task-time-main">${esc(t.time||'--:--')}</div><div class="task-time-sub">${esc(end||'—')}</div></div>
  <div class="task-block-cell"><div class="task-title">${esc(t.title)}${log.autoSkipped?'<span class="auto-skip-badge">Auto-skipped</span>':''}</div><div class="task-desc">${desc}</div>${taskProgressChipHtml(t,state.selectedDate)}<div class="task-corner-actions"><button class="task-corner-btn edit" title="Edit task" onclick="openTaskDrawer('${pid}','plan')">${ICONS.edit}</button><button class="task-corner-btn delete" title="Delete task" onclick="openTaskDeleteModal('${pid}')">${ICONS.delete}</button><button class="task-corner-btn copy" title="Duplicate task" onclick="duplicateTask('${pid}')">${ICONS.copy}</button></div></div>
  <div class="task-action-cell ${(t.tracker||{type:'checkbox'}).type==='checkbox'?'checkbox-only':''}">
    <div class="action-row state-row"><button class="state-btn done ${status==='done'?'active':''}" ${locked?'disabled':''} title="${locked?'Future dates are view-only':'Complete'}" onclick="toggleStatus('${id}','done')">${ICONS.check}</button><button class="state-btn skip ${status==='skipped'?'active':''}" ${locked?'disabled':''} title="${locked?'Future dates are view-only':'Skip'}" onclick="toggleStatus('${id}','skipped')">${ICONS.dash}</button></div>
    ${(t.tracker||{type:'checkbox'}).type==='checkbox'?'':`<div class="action-row progress-row">${renderProgressButtons(t,log,locked)}</div>`}
  </div>
  <div class="task-priority-cell"><span class="priority">${esc((t.priority||'p2').toUpperCase())}</span></div>
  <div class="task-tags-cell"><div class="task-tags-row">${tagHtml||'<span class="tag-pill" style="color:#8a7b69;background:#8a7b6915">No tag</span>'}${progressBtn}</div></div>
  <div class="task-calendar-cell"><div class="task-cal interactive" role="button" tabindex="0" title="Open task calendar" onclick="openTaskCalendarModal('${pid}')">${renderMiniCalendar(taskByAnyId(pid)||t)}</div></div>
 </article>`;
}

<script id="mobile-11-compact-header-script">

  function panelSvg(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path></svg>'}
  function todayBtnHtml(){return '<button class="mobile-left-today" type="button" onclick="goToday();toggleMobileLeftPane(false)">'+(ICONS.today||'')+'<span>Go to today</span></button>'}
  window.toggleMobileFilterPanel=function(force){
    const wrap=document.querySelector('.planner-main>.quick-box');

    if(!wrap||!panel){return;}
    const next=typeof force==='boolean'?force:!wrap.classList.contains('mobile-filters-open');
    wrap.classList.toggle('mobile-filters-open',next);
    if('open' in panel) panel.open=next;
    document.querySelectorAll('.mobile-day-action.filter').forEach(btn=>btn.classList.toggle('active',next));
    if(next){setTimeout(()=>{const first=wrap.querySelector('select,input,button'); if(first) first.focus({preventScroll:true});},30)}
  };
  window.renderFilters=function(){
    const status=state.statusFilter||'all', tag=state.tagFilter||'all';
    const activeCount=(status!=='all'?1:0)+(tag!=='all'?1:0)+((state.textFilter||'').trim()?1:0);
    const label=activeCount?`Filters · ${activeCount}`:'Filters';
    const tagOpts=['<option value="all">All tags</option>',...tags().map(t=>`<option value="${esc(t.key)}" ${tag===t.key?'selected':''}>${t.icon} ${esc(t.name)}</option>`)].join('');

  };
  window.renderBreadcrumb=function(){
    if(!moduleEnabled(state.section)){state.section='ideal-day';state.sub='today'}

<script id="mobile-17-filter-typing-stability-script">
(function(){
  function isMobile(){return window.matchMedia&&window.matchMedia('(max-width: 860px)').matches;}
  function ensureMobileFilterMount(){
    if(!isMobile())return null;
    let mount=document.getElementById('mobileFilterInlineMount');

      mount=document.createElement('div');

      const layout=document.querySelector('#contentRoot .planner-layout');
      if(layout&&layout.parentNode)layout.parentNode.insertBefore(mount,layout);
    }
    return mount;
  }
  function restoreMobileFilters(){
    if(!isMobile()||!window.__lifeosMobileFiltersOpen)return;
    const mount=ensureMobileFilterMount();
    let box=document.querySelector('.planner-main>.quick-box') || document.querySelector('#mobileFilterInlineMount>.quick-box');
    if(mount&&box&&box.parentNode!==mount)mount.appendChild(box);
    if(box){
      box.classList.add('mobile-filters-open');
      box.style.display='block';
      box.style.position='relative';
      box.style.zIndex='5';
      const panel=box.querySelector('#mobileFilterPanel,.mobile-filter-panel');
      if(panel&&'open' in panel)panel.open=true;
    }
    document.body.classList.add('mobile-filters-open');
    document.querySelectorAll('.mobile-day-action.filter').forEach(btn=>btn.classList.add('active'));
  }
  const prevToggle=window.toggleMobileFilterPanel;
  window.toggleMobileFilterPanel=function(force){
    const next=typeof force==='boolean'?force:!document.body.classList.contains('mobile-filters-open');
    window.__lifeosMobileFiltersOpen=!!next;
    if(typeof prevToggle==='function'){
      const result=prevToggle(force);
      if(next) setTimeout(restoreMobileFilters,0);
      return result;
    }
    if(next)restoreMobileFilters();
    return false;
  };
  const prevRender=window.renderIdealDay;
  if(typeof prevRender==='function'){
    window.renderIdealDay=function(){
      const keep=isMobile() && window.__lifeosMobileFiltersOpen;
      prevRender.apply(this,arguments);
      if(keep){window.__lifeosMobileFiltersOpen=true; setTimeout(restoreMobileFilters,0);}
    };
  }
  ['setTextFilter','setStatusFilter','setTagFilter'].forEach(function(name){
    const prev=window[name];
    if(typeof prev==='function'){
      window[name]=function(){
        const keep=isMobile() && document.body.classList.contains('mobile-filters-open');
        if(keep)window.__lifeosMobileFiltersOpen=true;
        const result=prev.apply(this,arguments);
        if(keep)setTimeout(restoreMobileFilters,0);
        return result;
      };
    }
  });
})();
</script>


<!-- v2.10.56 mobile-18 — keep Android keyboard/focus while typing in task text filter -->
<script id="mobile-18-filter-keyboard-focus-script">
(function(){
  function isIdealDayVisible(){
    return typeof state !== 'undefined' && state && state.section === 'ideal-day' && document.querySelector('.planner-main');
  }
  function renderTaskAreaOnly(){
    const main=document.querySelector('.planner-main');
    if(!main || typeof selectedTasks!=='function' || typeof renderTaskCard!=='function') return false;
    const selectedList=selectedTasks();

    // Remove only the task result area, not the filter input. Rebuilding the filter input is what
    // makes Android dismiss the keyboard after every character.
    Array.from(main.children).forEach(function(child){
      if(child.classList && !child.classList.contains('quick-box')) child.remove();
    });

    if(selectedList.length){
      const head=document.createElement('div');
      head.className='task-table-head';
      head.innerHTML='<div>Time</div><div>Task</div><div>Action</div><div>Priority</div><div>Tags</div><div>Calendar</div>';
      const list=document.createElement('div');
      list.className='task-list task-table';
      list.innerHTML=selectedList.map(renderTaskCard).join('');
      main.appendChild(head);
      main.appendChild(list);
    }else{
      const list=document.createElement('div');
      list.className='task-list';
      list.innerHTML='<div class="empty">No tasks match this filter.</div>';
      main.appendChild(list);
    }
    return true;
  }
  function syncFilterInputs(value){
    document.querySelectorAll('#taskTextFilter').forEach(function(el){
      if(el !== document.activeElement && el.value !== value) el.value=value;
    });
  }
  function keepMobileFiltersOpen(){
    if(!(window.matchMedia && window.matchMedia('(max-width: 860px)').matches)) return;
    window.__lifeosMobileFiltersOpen=true;
    document.body.classList.add('mobile-filters-open');
    const box=document.querySelector('#mobileFilterInlineMount>.quick-box') || document.querySelector('.planner-main>.quick-box');
    if(box){
      box.classList.add('mobile-filters-open');
      box.style.display='block';
      box.style.position='relative';
      box.style.zIndex='5';
      const panel=box.querySelector('#mobileFilterPanel,.mobile-filter-panel');
      if(panel && 'open' in panel) panel.open=true;
    }
    document.querySelectorAll('.mobile-day-action.filter').forEach(function(btn){btn.classList.add('active');});
  }

  window.setTextFilter=function(v){
    const value=v || '';
    const active=document.activeElement;
    const shouldRestore=active && active.id==='taskTextFilter';
    const start=shouldRestore ? active.selectionStart : null;
    const end=shouldRestore ? active.selectionEnd : null;
    const scrollX=window.scrollX || window.pageXOffset || 0;
    const scrollY=window.scrollY || window.pageYOffset || 0;

    state.textFilter=value;
    state.skipDayCenterOnce=true;
    keepMobileFiltersOpen();

    if(isIdealDayVisible()){
      const updated=renderTaskAreaOnly();
      syncFilterInputs(value);
      if(!updated) renderIdealDay();
    }else{
      renderIdealDay();
    }

    if(shouldRestore){
      const restore=function(){
        window.scrollTo(scrollX,scrollY);
        const el=document.getElementById('taskTextFilter');
        if(el){
          if(el.value!==value) el.value=value;
          try{el.focus({preventScroll:true});}catch(e){el.focus();}
          try{el.setSelectionRange(start==null?el.value.length:start,end==null?el.value.length:end);}catch(e){}
        }
      };
      restore();
      requestAnimationFrame(restore);
      setTimeout(restore,0);
    }
  };
})();
</script>
